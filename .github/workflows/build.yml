name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: |
        cargo build --verbose
        cargo build --release --verbose
    - name: Upload binary
      uses: actions/upload-artifact@v3
      with:
        name: mtproxy
        path: target/release/mtproxy
